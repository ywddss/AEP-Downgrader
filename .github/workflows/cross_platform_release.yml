name: Create Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 psutil

      - name: Build executable
        run: |
          pyinstaller src/AEPdowngrader.py --onefile --windowed --name AEP-Downgrader --add-data "assets/icon.png;assets" --hidden-import=psutil --hidden-import=debug_logger --collect-all=PyQt5 --collect-all=debug_logger

      - name: Prepare Windows distribution
        run: |
          mkdir "AEP-Downgrader-Windows"
          copy "dist\AEP-Downgrader.exe" "AEP-Downgrader-Windows\"
          echo "AEP Downgrader - Windows Portable Version" > "AEP-Downgrader-Windows\README.txt"
          Add-Content -Path "AEP-Downgrader-Windows\README.txt" -Value ""
          Add-Content -Path "AEP-Downgrader-Windows\README.txt" -Value "To run the application, double-click AEP-Downgrader.exe"
          Compress-Archive -Path "AEP-Downgrader-Windows" -DestinationPath "AEP-Downgrader-Windows.zip"

      - name: Upload Windows Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./AEP-Downgrader-Windows.zip

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 psutil

      - name: Build executable
        run: |
          pyinstaller src/AEPdowngrader.py --onefile --windowed --name AEP-Downgrader --add-data "assets/icon.png:assets" --hidden-import=psutil --hidden-import=debug_logger --collect-all=PyQt5 --collect-all=debug_logger

      - name: Prepare Linux distribution
        run: |
          mkdir -p "AEP-Downgrader-Linux"
          cp dist/AEP-Downgrader "AEP-Downgrader-Linux/"
          echo "AEP Downgrader - Linux Portable Version" > "AEP-Downgrader-Linux/README.txt"
          echo "" >> "AEP-Downgrader-Linux/README.txt"
          echo "To run the application, execute AEP-Downgrader" >> "AEP-Downgrader-Linux/README.txt"
          tar -czvf "AEP-Downgrader-Linux.tar.gz" "AEP-Downgrader-Linux"

      - name: Upload Linux Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./AEP-Downgrader-Linux.tar.gz

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 psutil

      - name: Generate macOS icon (.icns)
        run: |
          rm -rf assets/icon.iconset
          mkdir -p assets/icon.iconset
          sips -z 16 16     assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build app bundle
        run: |
          pyinstaller src/AEPdowngrader.py --onedir --windowed --noconsole --name AEP-Downgrader --icon=assets/icon.icns --osx-bundle-identifier com.itsanchorpoint.aepdowngrader --add-data "assets/icon.png:assets" --hidden-import=psutil --hidden-import=debug_logger --collect-all=PyQt5 --collect-all=debug_logger

      - name: Create DMG
        run: |
          rm -rf release-macos
          mkdir -p release-macos
          cp -R "dist/AEP-Downgrader.app" "release-macos/"
          ln -s /Applications "release-macos/Applications"
          hdiutil create -volname "AEP-Downgrader" -srcfolder "release-macos" -ov -format UDZO -o AEP-Downgrader-macOS.dmg

      - name: Upload macOS Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./AEP-Downgrader-macOS.dmg
